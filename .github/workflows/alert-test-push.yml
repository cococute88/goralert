name: Goralert Test Push Drain

# Drains browser-enqueued test-push requests (users/{uid}/testPushRequests)
# through the SAME production delivery path as scheduled alerts
# (python -m alert_engine.main --test-push -> send_test_alert -> PushChannel).
#
# The web "테스트 Push / Telegram" buttons only WRITE a request document; this
# workflow is what actually delivers it via FCM/Telegram (through the SAME
# PushChannel as production). PRIMARY trigger: the button fires workflow_dispatch
# immediately via the thin /api/test-push bridge, so delivery starts within
# seconds of the click. The short cron is only a FALLBACK for requests whose
# immediate dispatch failed (e.g. GITHUB_DISPATCH_TOKEN not configured).
#
# GitHub Actions cron is UTC and best-effort (may lag a few minutes under load).

on:
  workflow_dispatch:
    inputs:
      uid:
        description: "Restrict drain to a single uid (default: all users)"
        required: false
        default: ""
  schedule:
    # Every 5 minutes — the practical minimum for GitHub Actions schedules.
    - cron: "*/5 * * * *"

permissions:
  contents: read

# Serialize with the main engine so a test send and a scheduled send never race
# on the same user's delivery/log writes.
concurrency:
  group: goralert-alert-engine
  cancel-in-progress: false

jobs:
  drain-test-push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      DEFAULT_TZ: "Asia/Seoul"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Drain test-push requests
        run: |
          python -m alert_engine.main --test-push \
            ${{ github.event.inputs.uid && format('--uid {0}', github.event.inputs.uid) || '' }}

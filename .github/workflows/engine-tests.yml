name: Alert Engine Tests

# CI for the Python alert engine. Runs the offline pytest + hypothesis suite on
# every push / PR (and on demand). NO secrets required — the suite uses in-memory
# fakes for the data source, delivery channels, and Firestore (no network, no
# firebase-admin init, no yfinance calls; pandas-dependent paths importorskip).

on:
  push:
    paths:
      - "alert_engine/**"
      - "requirements.txt"
      - "pytest.ini"
      - ".github/workflows/engine-tests.yml"
  pull_request:
    paths:
      - "alert_engine/**"
      - "requirements.txt"
      - "pytest.ini"
      - ".github/workflows/engine-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: engine-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Ensure test tooling is present even if requirements.txt drifts.
          pip install pytest hypothesis

      - name: Run alert-engine test suite
        run: pytest alert_engine/tests -q

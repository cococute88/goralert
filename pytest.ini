[pytest]
# GORALERT Python alert-engine test config.
# Scopes test discovery to the engine suite so running `pytest` from the repo
# root never picks up the Next.js app or the original/ Streamlit project.
testpaths = alert_engine/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# hypothesis is loaded as a pytest plugin automatically; register its marker so
# `-W error`/strict-markers setups don't warn on property-based tests.
markers =
    property: property-based (hypothesis) correctness tests

# Keep output quiet+fast by default; CI passes -q explicitly.
addopts = -ra
